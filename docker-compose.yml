services:
  app:
    image: ${XBACKBONE_IMAGE:-xbackbone-docker:local}
    build:
      context: ./docker/xbackbone
    restart: always
    env_file:
      - ./env/compose.env
    ports:
      - '80:80'
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - xbb_storage:/app/storage
      - xbb_database:/app/resources/database
      - xbb_logs:/app/logs
      - xbb_config:/app/config
  db:
    image: mariadb:10.11
    restart: always
    env_file:
      - ./env/compose.env
    volumes:
      - xbb_mariadb:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  frontend:
  backend:

volumes:
  xbb_mariadb:
  xbb_storage:
  xbb_database:
  xbb_logs:
  xbb_config:
